<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Chat v2</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; margin: 0; }
        .box { border: 1px solid #00f; height: 90vh; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }
        #msgs { flex-grow: 1; overflow-y: auto; border: 1px solid #222; margin: 10px 0; display: flex; flex-direction: column; }
        input { background: #000; border: 1px solid #00f; color: #0f0; padding: 12px; width: 100%; box-sizing: border-box; outline: none; }
        button { padding: 12px; margin-top: 5px; cursor: pointer; width: 100%; border: none; font-weight: bold; }
        .hidden { display: none; }
        .m { margin: 5px; padding: 8px; border-radius: 5px; max-width: 80%; word-wrap: break-word; }
        .me { color: #fff; background: #00f; align-self: flex-end; }
        .them { color: #000; background: #0f0; align-self: flex-start; }
    </style>
</head>
<body>
    <div id="view-login">
        <h3>GHOST_SYSTEM LOGIN</h3>
        <input type="text" id="uid" placeholder="Enter Username">
        <button onclick="start()" style="background:#00f; color:#fff">INITIALIZE</button>
    </div>

    <div id="view-conn" class="hidden">
        <p>ID: <span id="myid" style="color:#fff"></span></p>
        <input type="text" id="fid" placeholder="Target ID">
        <button onclick="connect()" style="background:#00f; color:#fff">CONNECT</button>
        <div id="notif" class="hidden" style="border:1px dashed #0f0; margin-top:20px; padding:10px;">
            <p id="ntxt"></p>
            <button onclick="accept()" style="background:#0f0; color:#000">ACCEPT HANDSHAKE</button>
        </div>
    </div>

    <div id="view-chat" class="hidden">
        <div class="box">
            <div id="msgs"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="mi" placeholder="Message...">
                <button onclick="sendMsg()" style="background:#0f0; width:80px">SEND</button>
            </div>
        </div>
    </div>

<script>
    let p, c, my;
    const v = (id) => {
        ['view-login', 'view-conn', 'view-chat'].forEach(i => document.getElementById(i).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    function start() {
        my = document.getElementById('uid').value.trim().toLowerCase();
        if(!my) return;
        p = new Peer(my);
        p.on('open', (id) => {
            document.getElementById('myid').innerText = id;
            v('view-conn');
        });
        p.on('connection', (conn) => {
            c = conn;
            setup();
            document.getElementById('ntxt').innerText = "Incoming: " + c.peer;
            document.getElementById('notif').classList.remove('hidden');
        });
        p.on('error', (err) => alert("PeerJS Error: " + err.type));
    }

    function connect() {
        const f = document.getElementById('fid').value.trim().toLowerCase();
        c = p.connect(f, { reliable: true });
        setup();
    }

    function setup() {
        c.on('open', () => {
            c.on('data', (d) => {
                if(d === "_SIGNAL_OK_") v('view-chat');
                else ui(c.peer, d);
            });
        });
    }

    function accept() {
        if(c && c.open) {
            c.send("_SIGNAL_OK_");
            v('view-chat');
        }
    }

    function sendMsg() {
        const m = document.getElementById('mi').value;
        if(!m || !c) return;
        c.send(m);
        ui("You", m);
        document.getElementById('mi').value = "";
    }

    function ui(u, m) {
        const d = document.getElementById('msgs');
        const cls = u === "You" ? "me" : "them";
        d.innerHTML += `<div class="m ${cls}"><b>${u}:</b><br>${m}</div>`;
        d.scrollTop = d.scrollHeight;
    }
</script>
</body>
</html>
