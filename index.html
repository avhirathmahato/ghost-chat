<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Chat Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --system: #64748b; }
        * { box-sizing: border-box; transition: all 0.2s; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px 20px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .user-pill { background: #334155; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: var(--accent); font-weight: bold; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; position: relative; }
        .sent { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
        .time { font-size: 9px; opacity: 0.6; display: block; margin-top: 4px; text-align: right; }
        .system { align-self: center; font-size: 10px; color: var(--system); text-transform: uppercase; margin: 5px; }
        
        #input-area { padding: 15px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid #334155; }
        #msg-input { flex: 1; background: #0f172a; border: 1px solid #334155; padding: 10px 15px; border-radius: 20px; color: white; outline: none; }
        .btn-circle { cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: #334155; border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .modal { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .file-link { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: bold;">GHOST CHAT</div>
        <div class="user-pill" id="display-name">@...</div>
        <button class="btn-circle" id="open-conn">➕</button>
    </header>

    <div id="chat-window"></div>

    <div id="input-area">
        <label class="btn-circle">📎<input type="file" id="file-input" class="hidden"></label>
        <input type="text" id="msg-input" placeholder="Message...">
        <button id="send-btn" class="btn-circle" style="background:var(--accent)">🚀</button>
    </div>

    <div id="req-modal" class="modal-overlay">
        <div class="modal">
            <h3>Connection Request</h3>
            <p id="req-text"></p>
            <div class="btn-row">
                <button class="btn" style="background:var(--accent); color:white" id="btn-accept">Accept</button>
                <button class="btn" style="background:#475569; color:white" id="btn-reject">Decline</button>
            </div>
        </div>
    </div>

    <script>
        const chatWin = document.getElementById('chat-window');
        const msgInput = document.getElementById('msg-input');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function beep() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = "sine"; osc.frequency.value = 440;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            osc.stop(audioCtx.currentTime + 0.5);
        }

        let myUser = localStorage.getItem('ghost-user');
        if (!myUser) {
            myUser = prompt("Choose Username:") || "User" + Math.floor(Math.random()*99);
            localStorage.setItem('ghost-user', myUser);
        }
        document.getElementById('display-name').innerText = "@" + myUser;

        const peer = new Peer(myUser);
        let conn;

        // Load History
        const history = JSON.parse(localStorage.getItem('chat-history') || "[]");
        history.forEach(h => display(h.content, h.type, h.isImg, h.time, false));

        function display(content, type, isImg = false, time = null, save = true) {
            const timestamp = time || new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            
            if (isImg) {
                const i = document.createElement('img'); i.src = content; div.appendChild(i);
            } else if (content.startsWith('data:')) {
                const a = document.createElement('a'); a.href = content; a.className = "file-link";
                a.download = "received_file"; a.innerText = "📁 Download Attached File"; div.appendChild(a);
            } else {
                div.innerText = content;
            }

            const span = document.createElement('span'); span.className = 'time';
            span.innerText = timestamp; div.appendChild(span);
            chatWin.appendChild(div);
            chatWin.scrollTop = chatWin.scrollHeight;

            if (save) {
                const logs = JSON.parse(localStorage.getItem('chat-history') || "[]");
                logs.push({content, type, isImg, time: timestamp});
                localStorage.setItem('chat-history', JSON.stringify(logs.slice(-50)));
            }
        }

        function setupConn() {
            conn.on('open', () => { beep(); display("HANDSHAKE COMPLETE: " + conn.peer, 'system'); });
            conn.on('data', data => {
                beep();
                if(data.type === 'file') display(data.data, 'received', data.isImg);
                else display(data, 'received');
            });
        }

        peer.on('open', id => display("NODE ONLINE: " + id, 'system'));
        peer.on('connection', incoming => {
            beep();
            document.getElementById('req-text').innerText = incoming.peer + " wants to link.";
            document.getElementById('req-modal').style.display = 'flex';
            document.getElementById('btn-accept').onclick = () => {
                conn = incoming; setupConn();
                document.getElementById('req-modal').style.display = 'none';
            };
            document.getElementById('btn-reject').onclick = () => {
                incoming.close(); document.getElementById('req-modal').style.display = 'none';
            };
        });

        document.getElementById('open-conn').onclick = () => {
            const target = prompt("Target Username:");
            if (target) { conn = peer.connect(target); setupConn(); }
        };

        document.getElementById('send-btn').onclick = () => {
            const val = msgInput.value;
            if(val && conn) { conn.send(val); display(val, 'sent'); msgInput.value = ''; }
        };

        document.getElementById('file-input').onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                const isImg = file.type.startsWith('image/');
                if(conn) {
                    conn.send({type: 'file', data: reader.result, isImg});
                    display(reader.result, 'sent', isImg);
                }
            };
            reader.readAsDataURL(file);
        };

        msgInput.onkeypress = (e) => { if(e.key === "Enter") document.getElementById('send-btn').click(); };
    </script>
</body>
</html>
