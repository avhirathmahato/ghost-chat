<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Chat P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: var(--card); text-align: center; font-weight: bold; border-bottom: 1px solid #334155; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 14px; word-wrap: break-word; }
        .sent { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--card); border-bottom-left-radius: 2px; }
        img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        #input-area { padding: 15px; background: var(--card); display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #334155; border: none; padding: 10px; border-radius: 20px; color: white; outline: none; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header>GHOST CHAT <span id="my-id" style="font-size:10px; color:gray;"></span></header>
    <div id="chat-window"></div>
    <div id="input-area">
        <label style="cursor:pointer">🖼️<input type="file" id="img-input" class="hidden" accept="image/*"></label>
        <input type="text" id="msg-input" placeholder="Type a message...">
        <button id="send-btn" style="background:none; border:none; color:var(--accent); font-weight:bold; cursor:pointer;">SEND</button>
    </div>
    <script>
        const peer = new Peer();
        let conn;
        const chatWin = document.getElementById('chat-window');
        
        peer.on('open', id => { document.getElementById('my-id').innerText = "ID: " + id; console.log('My ID:', id); });
        
        // Target ID via URL param for easy P2P connection
        const targetId = new URLSearchParams(window.location.search).get('peer');
        if (targetId) { 
            setTimeout(() => { conn = peer.connect(targetId); setupConn(); }, 1000); 
        }

        peer.on('connection', c => { conn = c; setupConn(); });

        function setupConn() {
            conn.on('data', data => {
                if(data.type === 'img') display(data.data, 'received', true);
                else display(data, 'received');
            });
        }

        function display(content, type, isImg = false) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            if(isImg) { const i = document.createElement('img'); i.src = content; div.appendChild(i); }
            else { div.innerText = content; }
            chatWin.appendChild(div);
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        document.getElementById('send-btn').onclick = () => {
            const msg = document.getElementById('msg-input').value;
            if(msg && conn) { conn.send(msg); display(msg, 'sent'); document.getElementById('msg-input').value = ''; }
        };

        document.getElementById('img-input').onchange = e => {
            const reader = new FileReader();
            reader.onload = () => {
                const base64 = reader.result;
                if(conn) { conn.send({type:'img', data:base64}); display(base64, 'sent', true); }
            };
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
