<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Chat P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--card); border-bottom-left-radius: 2px; }
        .system { align-self: center; background: none; color: #64748b; font-size: 11px; text-align: center; }
        img { max-width: 100%; border-radius: 10px; }
        #input-area { padding: 15px; background: var(--card); display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #334155; border: none; padding: 10px; border-radius: 20px; color: white; outline: none; }
        button { background: none; border: none; color: var(--accent); font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header>
        <span id="display-name">GHOST</span>
        <button id="conn-btn">CONNECT</button>
    </header>
    <div id="chat-window"></div>
    <div id="input-area">
        <label style="cursor:pointer">🖼️<input type="file" id="img-input" class="hidden" accept="image/*"></label>
        <input type="text" id="msg-input" placeholder="Type a message...">
        <button id="send-btn">SEND</button>
    </div>

    <script>
        let myUser = localStorage.getItem('ghost-user');
        if (!myUser) {
            myUser = prompt("Choose your permanent username:") || "User" + Math.floor(Math.random()*100);
            localStorage.setItem('ghost-user', myUser);
        }
        document.getElementById('display-name').innerText = myUser;

        const peer = new Peer(myUser);
        let conn;
        const chatWin = document.getElementById('chat-window');

        function display(content, type, isImg = false) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            if(isImg) { const i = document.createElement('img'); i.src = content; div.appendChild(i); }
            else { div.innerText = content; }
            chatWin.appendChild(div);
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        function setupConn() {
            conn.on('open', () => display("CONNECTED TO " + conn.peer, 'system'));
            conn.on('data', data => {
                if(data.type === 'img') display(data.data, 'received', true);
                else display(data, 'received');
            });
            conn.on('close', () => display("CONNECTION CLOSED", 'system'));
        }

        peer.on('open', id => display("ONLINE AS: " + id, 'system'));

        // REQUEST HANDLER (THE FIX)
        peer.on('connection', incomingConn => {
            const accept = confirm("Incoming request from: " + incomingConn.peer + ". Accept?");
            if (accept) {
                conn = incomingConn;
                setupConn();
            } else {
                incomingConn.close();
                display("REJECTED CONNECTION FROM " + incomingConn.peer, 'system');
            }
        });

        document.getElementById('conn-btn').onclick = () => {
            const target = prompt("Connect to username:");
            if (target) { 
                display("SENDING REQUEST TO " + target + "...", 'system');
                conn = peer.connect(target); 
                setupConn(); 
            }
        };

        document.getElementById('send-btn').onclick = () => {
            const msg = document.getElementById('msg-input').value;
            if(msg && conn) { conn.send(msg); display(msg, 'sent'); document.getElementById('msg-input').value = ''; }
        };

        document.getElementById('img-input').onchange = e => {
            const reader = new FileReader();
            reader.onload = () => {
                if(conn) { conn.send({type:'img', data:reader.result}); display(reader.result, 'sent', true); }
            };
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
