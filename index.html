<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Chat P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --accent-hover: #2563eb; --text: #f8fafc; --system: #64748b; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header & Status */
        header { padding: 16px 20px; background: var(--card); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); z-index: 10; }
        .user-pill { background: #334155; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--accent); }
        
        /* Chat Area */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
        .system { align-self: center; background: rgba(100, 116, 139, 0.1); color: var(--system); font-size: 11px; padding: 4px 12px; border-radius: 10px; margin: 8px 0; }
        img { max-width: 100%; border-radius: 12px; display: block; margin-top: 5px; }

        /* Input Bar */
        #input-area { padding: 16px; background: var(--card); display: flex; gap: 12px; align-items: center; border-top: 1px solid #334155; }
        #msg-input { flex: 1; background: #0f172a; border: 1px solid #334155; padding: 12px 18px; border-radius: 24px; color: white; outline: none; }
        #msg-input:focus { border-color: var(--accent); }
        .icon-btn { cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: #334155; border: none; font-size: 18px; }
        .icon-btn:hover { background: #475569; }
        #send-btn { background: var(--accent); color: white; font-weight: bold; width: auto; padding: 0 20px; border-radius: 20px; }
        #send-btn:hover { background: var(--accent-hover); }

        /* Custom Modal UI */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal { background: var(--card); padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; }
        .modal h3 { margin-top: 0; }
        .modal input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: var(--bg); color: white; margin: 15px 0; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sub { background: #475569; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: 800; letter-spacing: 1px;">GHOST CHAT</div>
        <div class="user-pill" id="display-name">...</div>
        <button class="icon-btn" id="open-conn" title="Connect">➕</button>
    </header>

    <div id="chat-window"></div>

    <div id="input-area">
        <label class="icon-btn" title="Send Image">🖼️<input type="file" id="img-input" class="hidden" accept="image/*"></label>
        <input type="text" id="msg-input" placeholder="Message...">
        <button id="send-btn" class="icon-btn">SEND</button>
    </div>

    <div id="request-modal" class="modal-overlay">
        <div class="modal">
            <h3 id="req-title">Incoming Request</h3>
            <p id="req-text"></p>
            <div class="modal-btns">
                <button class="btn btn-main" id="btn-accept">Accept</button>
                <button class="btn btn-sub" id="btn-reject">Decline</button>
            </div>
        </div>
    </div>

    <script>
        const chatWin = document.getElementById('chat-window');
        const msgInput = document.getElementById('msg-input');
        
        // Setup User
        let myUser = localStorage.getItem('ghost-user');
        if (!myUser) {
            myUser = prompt("Enter a Username to start:") || "User" + Math.floor(Math.random()*999);
            localStorage.setItem('ghost-user', myUser);
        }
        document.getElementById('display-name').innerText = "@" + myUser;

        const peer = new Peer(myUser);
        let conn;

        function display(content, type, isImg = false) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            if(isImg) {
                const i = document.createElement('img');
                i.src = content;
                div.appendChild(i);
            } else {
                div.innerText = content;
            }
            chatWin.appendChild(div);
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        function setupConn() {
            conn.on('open', () => display("SESSION ACTIVE WITH " + conn.peer, 'system'));
            conn.on('data', data => {
                if(data.type === 'img') display(data.data, 'received', true);
                else display(data, 'received');
            });
            conn.on('close', () => display("SESSION CLOSED", 'system'));
        }

        peer.on('open', id => display("SECURE NODE ONLINE: " + id, 'system'));

        // Beautiful Request Handling
        peer.on('connection', incoming => {
            document.getElementById('req-text').innerText = incoming.peer + " wants to connect with you.";
            document.getElementById('request-modal').style.display = 'flex';
            
            document.getElementById('btn-accept').onclick = () => {
                conn = incoming;
                setupConn();
                document.getElementById('request-modal').style.display = 'none';
            };
            
            document.getElementById('btn-reject').onclick = () => {
                incoming.close();
                document.getElementById('request-modal').style.display = 'none';
            };
        });

        document.getElementById('open-conn').onclick = () => {
            const target = prompt("Target Username:");
            if (target && target !== myUser) {
                display("ATTEMPTING HANDSHAKE WITH " + target + "...", 'system');
                conn = peer.connect(target);
                setupConn();
            }
        };

        document.getElementById('send-btn').onclick = () => {
            const val = msgInput.value;
            if(val && conn) {
                conn.send(val);
                display(val, 'sent');
                msgInput.value = '';
            }
        };

        document.getElementById('img-input').onchange = e => {
            const reader = new FileReader();
            reader.onload = () => {
                if(conn) {
                    conn.send({type: 'img', data: reader.result});
                    display(reader.result, 'sent', true);
                }
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        msgInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById('send-btn').click();
        });
    </script>
</body>
</html>
